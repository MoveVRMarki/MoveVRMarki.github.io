    <style>
        /* Specjalne style tylko dla tej podstrony "Linktree" */
        body.link-tree-page {
            margin: 0;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at 50% 0%, #1e1b3a 0%, #0d0d0d 60%);
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .links-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sekcja nagłówka (Profil) */
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00bcd4; /* Twój turkusowy akcent */
            padding: 3px;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.4);
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }

        .profile-desc {
            font-size: 0.95rem;
            color: #cccccc;
            margin: 0 0 1rem 0;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Małe ikonki social media pod opisem */
        .top-socials {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .top-socials a {
            color: #ffffff;
            font-size: 1.6rem;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .top-socials a:hover {
            transform: scale(1.15);
            color: #00bcd4;
        }

        /* Kontener na duże przyciski */
        .buttons-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Standardowy przycisk */
        .lt-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 1.2rem;
            border-radius: 8px;
            border: 1px solid #333;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-sizing: border-box;
        }

        .lt-btn:hover {
            background-color: #252525;
            transform: scale(1.02);
            border-color: #555;
        }

        .btn-icon {
            font-size: 1.5rem;
            width: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            padding-right: 30px; /* Kompensacja ikony dla wyśrodkowania tekstu */
        }

        /* Przycisk Discord z podtytułem */
        .lt-btn-discord {
            padding: 0.8rem 1.2rem;
        }
        .discord-text-wrapper {
            flex-grow: 1;
            text-align: center;
            padding-right: 30px;
        }
        .discord-title {
            font-weight: 700;
            font-size: 1rem;
        }
        .discord-sub {
            font-size: 0.75rem;
            color: #aaaaaa;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Przycisk Donate z obrazkiem */
        .lt-btn-donate {
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }
