    <style>
        /* Specjalne style tylko dla tej podstrony "Linktree" */
        body.link-tree-page {
            margin: 0;
            padding: 2rem 1.5rem;
            min-height: 100vh;
            background-color: #0d0d0d;
            background-image: radial-gradient(circle at 50% 0%, #1e1b3a 0%, #0d0d0d 60%);
            font-family: 'Poppins', sans-serif;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .links-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Sekcja nagłówka (Profil) */
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .profile-pic {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #00bcd4; /* Twój turkusowy akcent */
            padding: 3px;
            margin-bottom: 1rem;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.4);
        }

        .profile-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
        }

        .profile-desc {
            font-size: 0.95rem;
            color: #cccccc;
            margin: 0 0 1rem 0;
            line-height: 1.5;
            white-space: pre-line;
        }

        /* Małe ikonki social media pod opisem */
        .top-socials {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }

        .top-socials a {
            color: #ffffff;
            font-size: 1.6rem;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .top-socials a:hover {
            transform: scale(1.15);
            color: #00bcd4;
        }

        /* Kontener na duże przyciski */
        .buttons-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Standardowy przycisk */
        .lt-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background-color: #1a1a1a;
            color: #ffffff;
            text-decoration: none;
            padding: 1rem 1.2rem;
            border-radius: 8px;
            border: 1px solid #333;
            transition: transform 0.2s ease, background-color 0.2s ease;
            box-sizing: border-box;
        }

        .lt-btn:hover {
            background-color: #252525;
            transform: scale(1.02);
            border-color: #555;
        }

        .btn-icon {
            font-size: 1.5rem;
            width: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            padding-right: 30px; /* Kompensacja ikony dla wyśrodkowania tekstu */
        }

        /* Przycisk Discord z podtytułem */
        .lt-btn-discord {
            padding: 0.8rem 1.2rem;
        }
        .discord-text-wrapper {
            flex-grow: 1;
            text-align: center;
            padding-right: 30px;
        }
        .discord-title {
            font-weight: 700;
            font-size: 1rem;
        }
        .discord-sub {
            font-size: 0.75rem;
            color: #aaaaaa;
            font-weight: 400;
            margin-top: 2px;
        }

        /* Przycisk Donate z obrazkiem */
        .lt-btn-donate {
            flex-direction: column;
            padding: 0;
            overflow: hidden;
        }
        .lt-btn-donate img {
            width: 100%;
            height: auto;
            border-bottom: 1px solid #333;
            background-color: white; /* Białe tło dla grafiki donate jak na screenie */
        }
        .donate-text {
            padding: 1rem;
            width: 100%;
            text-align: center;
            font-weight: 600;
        }

        /* Kolory ikon */
        .fa-facebook { color: #1877F2; }
        .fa-instagram { 
            background: -webkit-linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .fa-tiktok { color: #fff; filter: drop-shadow(2px 0px 0px #FD3E3E) drop-shadow(-2px -2px 0px #4DE8F4); }
        .fa-twitch { color: #9146FF; }
        .fa-discord { color: #ffffff; }
        .fa-vr-cardboard { color: #00bcd4; } /* Kolor Twojej strony */
        .icon-kick { color: #53FC18; font-weight: 900; font-family: sans-serif; font-style: italic; letter-spacing: -1px; }

        /* Stopka / powrót na stronę główną */
        .bottom-branding {
            margin-top: 3rem;
            text-align: center;
        }
        .bottom-branding a {
            color: #888;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .bottom-branding a:hover {
            color: #00bcd4;
        }
    </style>

<body class="link-tree-page">

    <div class="links-container">
        
        <!-- NAGŁÓWEK (LOGO I OPIS) -->
        <div class="profile-header">
            <!-- Pobiera logo z Twojego serwera -->
            <img src="vrow-profile.jpg" alt="MoveVR Logo" class="profile-pic">
            <h1 class="profile-title">MoveVR</h1>
            <p class="profile-desc">Salon gier VR, Marki(pod Warszawą)<br>Zapraszam do rezerwacji terminów ;)</p>
            
            <div class="top-socials">
                <a href="https://www.instagram.com/movevrmarki" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="https://www.tiktok.com/@_movevr_" target="_blank" aria-label="TikTok"><i class="fab fa-tiktok"></i></a>
                <!-- IKONKA KICK ZAMIAST TWITCH -->
                <a href="https://kick.com/movevrmarki" target="_blank" aria-label="Kick" style="text-decoration: none; display: inline-flex; align-items: center;"><span class="icon-kick" style="font-size: 1.6rem; vertical-align: middle;">K</span></a>
            </div>
        </div>

        <!-- PRZYCISKI Z LINKAMI -->
        <div class="buttons-wrapper">
            
            <!-- DONATE (PRZENIESIONY NA GÓRĘ) -->
           <a href="https://tipply.pl/@movevr" target="_blank" class="lt-btn lt-btn-donate">
                <img src="donate.webp" alt="Animowany Donate Banner">
                <div class="donate-text">Donate</div>
            </a>

            <!-- DISCORD -->
            <a href="https://discord.gg/kwYC4tK9br" target="_blank" class="lt-btn lt-btn-discord">
                <div class="btn-icon"><i class="fab fa-discord"></i></div>
                <div class="discord-text-wrapper">
                    <div class="discord-title">MOVE VR</div>
                    <div class="discord-sub">Discord Server • Free to join</div>
                </div>
            </a>

            <!-- FACEBOOK -->
            <a href="https://www.facebook.com/profile.php?id=61572027485277" target="_blank" class="lt-btn">
                <div class="btn-icon"><i class="fab fa-facebook"></i></div>
                <div class="btn-text">Facebook</div>
            </a>

            <!-- TIKTOK -->
            <a href="https://www.tiktok.com/@_movevr_" target="_blank" class="lt-btn">
                <div class="btn-icon"><i class="fab fa-tiktok"></i></div>
                <div class="btn-text">TikTok</div>
            </a>

            <!-- KICK -->
            <a href="https://kick.com/movevrmarki" target="_blank" class="lt-btn">
                <div class="btn-icon icon-kick">K</div>
                <div class="btn-text">Kick</div>
            </a>

            <!-- STRONA GŁÓWNA -->
            <a href="index.html" class="lt-btn">
                <div class="btn-icon"><i class="fas fa-vr-cardboard"></i></div>
                <div class="btn-text">Strona</div>
            </a>

            <!-- TWITCH -->
            <a href="https://www.twitch.tv/movevrmarki" target="_blank" class="lt-btn">
                <div class="btn-icon"><i class="fab fa-twitch"></i></div>
                <div class="btn-text">Twitch</div>
            </a>

            <!-- INSTAGRAM -->
            <a href="https://www.instagram.com/movevrmarki" target="_blank" class="lt-btn">
                <div class="btn-icon"><i class="fab fa-instagram"></i></div>
                <div class="btn-text">Instagram</div>
            </a>

        </div>

        <div class="bottom-branding">
            <a href="index.html">© 2025 MoveVR</a>
        </div>

    </div>

</body>
</html>
